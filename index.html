const easeOut  = t => 1-(1-t)**2;
const easeIn   = t => t*t;
const easeBack = t => 2.7*t*t*t - 1.7*t*t;
const easeBounce= t => Math.abs(Math.sin(t*Math.PI));

function anim(dur, onFrame, onDone){
  dur=Math.max(1,dur*(SETTINGS.reduceMotion?0.35:SETTINGS.fastAnims?0.65:1));
  let elapsed=0;
  const tick=()=>{
    elapsed+=app.ticker.deltaMS;
    const t=Math.min(1,elapsed/dur);
    onFrame(t);
    if(t>=1){ app.ticker.remove(tick); onDone?.(); }
  };
  app.ticker.add(tick);
  return ()=>app.ticker.remove(tick);
}
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }
function lerp(a,b,t){ return a+(b-a)*t; }

}

// ── Sprite baking ─────────────────────────────────────────────────────────────
function bakeSprite(spr, px=PX){
  const g=new PIXI.Graphics();
  spr.art.forEach((row,sy)=>{
    for(let sx=0;sx<row.length;sx++){
      const col=spr.pal[row[sx]]; if(!col) continue;
      g.beginFill(col); g.drawRect(sx*px,sy*px,px,px); g.endFill();
    }
  });
  const rt=PIXI.RenderTexture.create({width:spr.w*px,height:spr.h*px});
  app.renderer.render(g,{renderTexture:rt});
  return rt;
}
function bakeIcon(spr){return bakeSprite(spr,3);}

function spawnEnemy(){
  const diff=SETTINGS.difficulty==='chill'?0.82:SETTINGS.difficulty==='brutal'?1.18:1;
  G.eMaxHP=Math.round((90+G.wave*55)*diff);
  G.eHP=G.eMaxHP;
  G.enemyShield=0;
  G.intent=makeEnemyIntent();
}

function makeEnemyIntent(){
  const diff=SETTINGS.difficulty==='chill'?0.8:SETTINGS.difficulty==='brutal'?1.25:1;
  const base=Math.round((8+G.wave*3)*diff);
  const r=Math.random();
  if(r<0.48) return {type:'strike',name:'STRIKE',dmg:base,      desc:`-${base} HP`};
  if(r<0.72) return {type:'heavy', name:'HEAVY', dmg:base+8,    desc:`-${base+8} HP`};
  if(r<0.88) return {type:'guard', name:'GUARD', dmg:0,         desc:'+30 SHIELD'};
  return           {type:'curse', name:'CURSE', dmg:Math.max(4,base-3), desc:'WEAKEN DICE'};
}

function freshRoll(){
  G.dice=Array.from({length:G.diceCount},(_,i)=>({
    value:Math.ceil(Math.random()*6),
    held:false,
    el:G.dice[i]?.el||'none',
    vy:-60,
  }));
  if(SETTINGS.autoSort) G.dice.sort((a,b)=>a.value-b.value);
}

function rollUnheld(){
  G.dice.forEach(d=>{
    if(!d.held){ d.value=Math.ceil(Math.random()*6); d.vy=-50; }
  });
}

function evalHand(dice){
  const vals=dice.map(d=>d.value);
  const freq={}; vals.forEach(v=>{freq[v]=(freq[v]||0)+1;});
  const counts=Object.values(freq).sort((a,b)=>b-a);
  const max=counts[0], sec=counts[1]||0;
  let h=0;
  if(max===5)h=6; else if(max===4)h=5;
  else if(max===3&&sec===2)h=4; else if(max===3)h=3;
  else if(max===2&&sec===2)h=2; else if(max===2)h=1;
  const hand=HANDS[h];
  const base=vals.reduce((a,b)=>a+b,0)+hand.chips;
  let em=1;
  dice.forEach(d=>{
    if(d.el==='fire')  em+=0.4;
    if(d.el==='ice')   em+=0.2;
    if(d.el==='poison')em+=0.3;
  });
  let jChips=0, jMult=0;
  G.jokers.forEach(j=>{
    if(j.type==='chips') jChips+=j.val;
    if(j.type==='mult')  jMult +=j.val;
  });
  const comboBoost=Math.min(6,G.combo);
  const chips=Math.round(base*em)+jChips+comboBoost*2;
  const mult =hand.mult+jMult+(G.blazeNextMult-1)+(G.focus||0);
  return {tier:h,hand,chips,mult,score:chips*mult};
}

// ── XP & Ability unlock ───────────────────────────────────────────────────────
function addXP(amount){
  G.xp+=amount;
  G.abilities.forEach(ab=>{
    if(!ab.unlocked && G.xp>=ab.xpReq){
      ab.unlocked=true; ab.ready=true;
      bigPopup(`${ab.name}\nUNLOCKED!`,C.gold,1.6);
      screenFlash(C.gold,300);
      burst(W/2,H*0.5,C.gold,30);
    }
  });
}

  bgG.beginFill(0x8bd8ab,0.75); bgG.drawPolygon([0,54,42,82,124,172,0,212]); bgG.endFill();
  bgG.beginFill(0x67c795,0.95); bgG.drawPolygon([W,50,W-72,20,W-156,165,W,248]); bgG.endFill();
  bgG.beginFill(0xa5e2b8,0.68); bgG.drawPolygon([W,52,W-38,84,W-124,174,W,218]); bgG.endFill();

  [[30,104,58,150],[W-30,104,58,150],[89,142,34,105],[W-89,142,34,105]].forEach(([x,y,w,h])=>{
    bgG.beginFill(0x2e6d73,0.42); bgG.drawEllipse(x,y+h+22,w*1.1,13); bgG.endFill();
    bgG.beginFill(0x396f6a,0.74); bgG.drawRoundedRect(x-w/2,y,w,h,2); bgG.endFill();
    bgG.beginFill(0x244f55,0.2);  bgG.drawRect(x-w/2,y,w,10); bgG.drawRect(x-w/2,y+h-12,w,12); bgG.endFill();
    bgG.beginFill(0xb8ffd6,0.32); bgG.drawRect(x-w/2+6,y+14,7,h-30); bgG.endFill();
    bgG.beginFill(0x0d2930,0.11); bgG.drawRect(x+w/2-8,y+7,8,h-14); bgG.endFill();

  bgG.beginFill(0xd6fff0,0.74); bgG.drawPolygon([W/2-58,92,W/2+58,92,W-10,H,10,H]); bgG.endFill();
  bgG.beginFill(0x8ace9e,0.92); bgG.drawPolygon([W/2-34,104,W/2+34,104,W-69,H,69,H]); bgG.endFill();
  bgG.beginFill(0xeafff2,0.23); bgG.drawPolygon([W/2-12,125,W/2+12,125,W-116,H,116,H]); bgG.endFill();

// ── World draw (enemy glow, HP bar, hero aura) ────────────────────────────────
function drawWorld(){
  worldG.clear(); fxG.clear();
  const t=G.tick;

  worldG.beginFill(0xffffff,0.22); worldG.drawEllipse(W/2,265,116,35); worldG.endFill();
  worldG.beginFill(0x35ee86,0.16); worldG.drawEllipse(W/2,356,100,30); worldG.endFill();

  if(G.eHP>0&&enemySpr){
    const bob=Math.sin(t*0.004)*5;
    enemySpr.y=enemyBase.y+bob;
    const pulse=0.1+0.06*Math.abs(Math.sin(t*0.005));
    fxG.beginFill(0xbd2fff,pulse*1.8); fxG.drawCircle(enemyBase.x,enemyBase.y+bob,62); fxG.endFill();
    fxG.beginFill(0xff55ee,pulse*0.75);fxG.drawCircle(enemyBase.x,enemyBase.y+bob,92); fxG.endFill();
    fxG.beginFill(0x000000,0.20);      fxG.drawEllipse(enemyBase.x,enemyBase.y+bob+51,80,17); fxG.endFill();
    enemySpr.visible=true;

    const bw=136,bh=10,bx=enemyBase.x-bw/2,by=enemyBase.y-bob+62;
    worldG.beginFill(0x16314a,0.85); worldG.drawRoundedRect(bx,by,bw,bh,4); worldG.endFill();
    const hf=Math.max(0,G.eHP/G.eMaxHP);
    worldG.beginFill(hf>0.5?C.hpG:hf>0.25?C.orange:C.hp);
    worldG.drawRoundedRect(bx+1,by+1,(bw-2)*hf,bh-2,3); worldG.endFill();
    worldG.beginFill(0xffffff,0.35); worldG.drawRoundedRect(bx+3,by+2,(bw-8)*hf*0.5,2,1); worldG.endFill();
    worldG.lineStyle(1,0xffffff,0.55); worldG.drawRoundedRect(bx,by,bw,bh,4); worldG.lineStyle(0);
  } else if(enemySpr){
    enemySpr.visible=false;
  }

  if(heroSpr){
    const auraCol=G.abilities[0].ready?C.fire:G.abilities[1].ready?C.cyan:C.purple;
    const ap=0.12+0.08*Math.abs(Math.sin(t*0.005));
    fxG.beginFill(auraCol,ap*1.8); fxG.drawCircle(heroSpr.x,heroSpr.y,54); fxG.endFill();
    fxG.beginFill(0xffffff,ap*0.48);fxG.drawCircle(heroSpr.x,heroSpr.y,72); fxG.endFill();
    fxG.beginFill(0x000000,0.18);   fxG.drawEllipse(heroSpr.x,heroSpr.y+38,58,13); fxG.endFill();
    heroTrail.forEach((tr,i)=>{
      const a=tr.alpha*(1-i/heroTrail.length)*0.4;
      if(a>0.01){
        fxG.beginFill(C.purple,a);
        fxG.drawRect(tr.x-14,tr.y-18,28,36);
        fxG.endFill();
      }
    });
  }

  if(_waveTxt){
    _waveTxt.text=`WAVE ${G.wave}`;
    _eLvlTxt.text=`${Math.ceil(G.eHP)}/${G.eMaxHP} HP${G.enemyShield>0?`  SH ${G.enemyShield}`:''}`;
  }
}

function buildUITexts(){

// ── Dice rendering ────────────────────────────────────────────────────────────
const diceG=new PIXI.Graphics(); Ldice.addChild(diceG);
let diceZones=[];
const DSZ=50;

function rebuildDiceZones(){
  diceZones.forEach(z=>Ldice.removeChild(z)); diceZones=[];
  const n=G.dice.length;
  const DS=SETTINGS.largeDice?56:DSZ;
  const spc=Math.min(DS+8,(W-38)/n);
  const sx=W/2-spc*(n-1)/2;
  G.dice.forEach((d,i)=>{
    const cx=sx+i*spc;
    const z=new PIXI.Graphics();
    z.beginFill(0xffffff,0.001); z.drawRoundedRect(cx-DS/2-9,UI.diceY-DS/2-9,DS+18,DS+18,9); z.endFill();
    z.eventMode='static'; z.cursor='pointer';
    z.on('pointertap',()=>toggleHold(i));
    Ldice.addChild(z); diceZones.push(z);
  });
}

function toggleHold(i){
  if(G.busy||G.phase!=='roll') return;
  G.dice[i].held=!G.dice[i].held;
  G.dice[i].vy=G.dice[i].held?-12:10;
}

function drawDice(){
  diceG.clear();
  const n=G.dice.length;
  const DS=SETTINGS.largeDice?56:DSZ;
  const spc=Math.min(DS+8,(W-38)/n);
  const sx=W/2-spc*(n-1)/2;

  G.dice.forEach((d,i)=>{
    d.vy=(d.vy||0)*0.72;
    // Held dice float + gently bob; non-held dice wobble while vy is large (rolling)
    const rolling=Math.abs(d.vy)>4;
    const wobble=rolling?(Math.sin(G.tick*0.07+i*1.8)*6*(Math.abs(d.vy)/50)):0;
    const cy=UI.diceY+d.vy+wobble;
    const cx=sx+i*spc;
    const ec=EL_COL[d.el||'none'];
    const held=d.held;
    // Held dice stay elevated and bob smoothly
    const bobOffset=held?Math.sin(G.tick*0.005+i*0.9)*4:0;
    const heldY=held?-26+bobOffset:0;

    if(ec){
      diceG.beginFill(ec,0.18); diceG.drawRoundedRect(cx-DS/2-11,cy-DS/2-11+heldY,DS+22,DS+22,10); diceG.endFill();
      diceG.beginFill(ec,0.28); diceG.drawRoundedRect(cx-DS/2-6,cy-DS/2-6+heldY,DS+12,DS+12,8); diceG.endFill();
    }
    if(held){
      diceG.beginFill(C.gold,0.18); diceG.drawRoundedRect(cx-DS/2-9,cy-DS/2-9+heldY,DS+18,DS+18,10); diceG.endFill();
      diceG.lineStyle(3,C.gold,0.95); diceG.drawRoundedRect(cx-DS/2-4,cy-DS/2-4+heldY,DS+8,DS+8,8); diceG.lineStyle(0);
    }
    diceG.beginFill(0x2aa8bd,0.20); diceG.drawCircle(cx,cy+heldY,DS*0.78); diceG.endFill();
    diceG.beginFill(0xffffff,0.40); diceG.drawCircle(cx,cy+heldY,DS*0.58); diceG.endFill();
    diceG.beginFill(0x000000,0.22); diceG.drawRoundedRect(cx-DS/2+5,cy-DS/2+6+heldY,DS,DS,7); diceG.endFill();

    const fcol=held?C.dieSel:C.dieW;
    diceG.beginFill(fcol); diceG.drawRoundedRect(cx-DS/2,cy-DS/2+heldY,DS,DS,7); diceG.endFill();
    diceG.beginFill(0xffffff,0.68); diceG.drawRoundedRect(cx-DS/2+3,cy-DS/2+3+heldY,DS-6,5,3); diceG.endFill();
    diceG.beginFill(0xffffff,0.35); diceG.drawRoundedRect(cx-DS/2+3,cy-DS/2+3+heldY,5,DS-6,3); diceG.endFill();
    diceG.beginFill(0x000000,0.12); diceG.drawRoundedRect(cx-DS/2+4,cy+DS/2-6+heldY,DS-8,4,2); diceG.endFill();
    diceG.lineStyle(2,ec||0x8eeeff,1); diceG.drawRoundedRect(cx-DS/2,cy-DS/2+heldY,DS,DS,7); diceG.lineStyle(0);

    const dots=DOTS[d.value]||[[0,0]];
    const pad=13, dr=4;
    dots.forEach(([dpx,dpy])=>{
      const dx=cx+dpx*pad, dy=cy+dpy*pad+heldY;
      diceG.beginFill(0x000000,0.2); diceG.drawRect(dx-dr+1,dy-dr+1,dr*2,dr*2); diceG.endFill();
      diceG.beginFill(C.dieDot);     diceG.drawRect(dx-dr,dy-dr,dr*2,dr*2);     diceG.endFill();
      diceG.beginFill(0xffffff,0.4); diceG.drawRect(dx-dr,dy-dr,dr,dr);         diceG.endFill();
    });

    if(ec){
      diceG.beginFill(0x000000,0.4); diceG.drawRect(cx+DS/2-12,cy-DS/2+heldY,12,12); diceG.endFill();
      diceG.beginFill(ec,1);         diceG.drawRect(cx+DS/2-11,cy-DS/2+1+heldY,10,10);diceG.endFill();
      diceG.beginFill(0xffffff,0.5); diceG.drawRect(cx+DS/2-10,cy-DS/2+2+heldY,5,5); diceG.endFill();
    }
  });

  G.dice.forEach((d,i)=>{
    if(!d.held) return;
    const cx=sx+i*spc;
    const bobOffset=Math.sin(G.tick*0.005+i*0.9)*4;
    const heldY=-26+bobOffset;
    // HELD badge
    const ty=UI.diceY+heldY-DS/2-14;
    diceG.beginFill(C.gold,0.95); diceG.drawRoundedRect(cx-18,ty,36,12,4); diceG.endFill();
    diceG.lineStyle(1,0xffffff,0.7); diceG.drawRoundedRect(cx-18,ty,36,12,4); diceG.lineStyle(0);
    // Sparkle dots around held die
    const sparkCount=4;
    for(let s=0;s<sparkCount;s++){
      const angle=G.tick*0.008+s*(Math.PI*2/sparkCount)+(i*0.5);
      const sr=DS*0.62, sx2=cx+Math.cos(angle)*sr, sy2=UI.diceY+heldY+Math.sin(angle)*sr*0.55;
      const sa=0.4+0.3*Math.sin(G.tick*0.01+s*1.7);
      diceG.beginFill(C.gold,sa); diceG.drawRect(sx2-2,sy2-2,4,4); diceG.endFill();
    }
  });
}

let settingsZones=[];
function showSettings(){
  if(G.busy&&G.phase!=='roll') return;
  Lover.removeChildren(); settingsZones=[];
  const oldPhase=G.phase; G.phase='settings';
  const ov=new PIXI.Graphics();
  ov.beginFill(0x05111c,0.92); ov.drawRect(0,0,W,H); ov.endFill();
  Lover.addChild(ov);
  const panel=new PIXI.Graphics();
  panel.beginFill(0x102942,0.98); panel.drawRoundedRect(12,18,W-24,H-36,16); panel.endFill();
  panel.beginFill(0xffffff,0.12); panel.drawRoundedRect(18,24,W-36,84,13); panel.endFill();
  panel.lineStyle(3,0xa9f6ff,0.9); panel.drawRoundedRect(12,18,W-24,H-36,16); panel.lineStyle(0);
  Lover.addChild(panel);

  function T(s,sz,x,y,col=0xffffff,ax=0){
    const t=new PIXI.Text(s,{fontFamily:FONT,fontSize:sz,fill:'#'+col.toString(16).padStart(6,'0'),align:'left',wordWrap:true,wordWrapWidth:W-52});
    t.anchor.set(ax,0.5); t.position.set(x,y); Lover.addChild(t); return t;
  }
  T('SETTINGS',18,30,50,C.gold);
  T('GAMEPLAY / VISUALS / RUN TOOLS',7,31,76,0xbffcff);

  function zone(x,y,w,h,cb){
    const z=new PIXI.Graphics();
    z.beginFill(0xffffff,0.001); z.drawRoundedRect(x,y,w,h,8); z.endFill();
    z.eventMode='static'; z.cursor='pointer'; z.on('pointertap',cb);
    Lover.addChild(z); settingsZones.push(z); return z;
  }
  function button(x,y,w,h,label,col,cb,fs=7){
    const g=new PIXI.Graphics();
    g.beginFill(0x000000,0.28); g.drawRoundedRect(x+3,y+4,w,h,8); g.endFill();
    g.beginFill(col,0.92); g.drawRoundedRect(x,y,w,h,8); g.endFill();
    g.beginFill(0xffffff,0.22); g.drawRoundedRect(x+3,y+3,w-6,11,5); g.endFill();
    g.lineStyle(2,0xffffff,0.55); g.drawRoundedRect(x,y,w,h,8); g.lineStyle(0);
    Lover.addChild(g);
    const txt=T(label,fs,x+w/2,y+h/2,0xffffff,0.5);
    zone(x,y,w,h,cb);
    return {g,txt};
  }
  function toggle(key,label,x,y){
    const on=!!SETTINGS[key];
    button(x,y,160,32,`${label}: ${on?'ON':'OFF'}`,on?0x228f6e:0x526174,()=>{
      SETTINGS[key]=!SETTINGS[key];
      if(key==='largeDice') rebuildDiceZones();
      showSettings();
    });
  }

  T('DIFFICULTY',8,31,124,0xffd44a);
  ['chill','normal','brutal'].forEach((d,i)=>{

// ── FX: screen shake ──────────────────────────────────────────────────────────
let shakeAmt=0, shakeTick=null;
function shake(strength, dur){
  if(!SETTINGS.shake||SETTINGS.reduceMotion) return;
  shakeAmt=strength;
  if(shakeTick) app.ticker.remove(shakeTick);
  let elapsed=0;
  shakeTick=app.ticker.add(()=>{
    elapsed+=app.ticker.deltaMS;
    const t=Math.min(1,elapsed/dur);
    design.x=designOffX+(Math.random()-0.5)*shakeAmt*(1-t);
    design.y=designOffY+(Math.random()-0.5)*shakeAmt*(1-t);
    if(t>=1){ design.x=designOffX; design.y=designOffY; app.ticker.remove(shakeTick); }
  });
}

function screenFlash(col,dur=200){
  if(!SETTINGS.flash) return;
  const g=new PIXI.Graphics(); g.beginFill(col,0.4); g.drawRect(0,0,W,H); g.endFill();
  Lpopup.addChild(g);
  setTimeout(()=>{
    let a=0.4;
    const tt=app.ticker.add(()=>{a-=0.035;g.alpha=Math.max(0,a);if(a<=0){Lpopup.removeChild(g);app.ticker.remove(tt);}});
  },dur);
}

// ── FX: attack animations ─────────────────────────────────────────────────────
const atkLayer=new PIXI.Container(); Lfx.addChild(atkLayer);

function slashArc(cx,cy,r,a0,a1,col,dur){
  const g=new PIXI.Graphics(); atkLayer.addChild(g);
  return new Promise(res=>anim(dur,t=>{
    g.clear();
    const a=Math.max(0,1-t*0.6);
    const sweep=a1+((a0-a1)*(1-easeOut(t)));
    const rr=r*(0.6+easeOut(t)*0.5);
    g.lineStyle(16,col,a*0.15); g.arc(cx,cy,rr+8,sweep,a1,false);
    g.lineStyle(8, col,a*0.4);  g.arc(cx,cy,rr,  sweep,a1,false);
    g.lineStyle(3, 0xffffff,a); g.arc(cx,cy,rr-4,sweep,a1,false);
    g.lineStyle(0);
  },()=>{ atkLayer.removeChild(g); res(); }));
}

function lightningBolt(x,y1,y2,col,dur){
  const g=new PIXI.Graphics(); atkLayer.addChild(g);
  const segs=12, pts=[];
  for(let i=0;i<=segs;i++){
    pts.push([x+(Math.random()-0.5)*(i<segs?28:0), y1+(y2-y1)*(i/segs)]);
  }
  return new Promise(res=>anim(dur,t=>{
    g.clear();
    const a=Math.max(0,1-t*0.8);
    const n=Math.ceil(pts.length*easeOut(t));
    g.lineStyle(12,col,a*0.15);
    for(let i=1;i<n;i++){ g.moveTo(pts[i-1][0],pts[i-1][1]); g.lineTo(pts[i][0],pts[i][1]); }
    g.lineStyle(5,col,a*0.5);
    for(let i=1;i<n;i++){ g.moveTo(pts[i-1][0],pts[i-1][1]); g.lineTo(pts[i][0],pts[i][1]); }
    g.lineStyle(2,0xffffff,a);
    for(let i=1;i<n;i++){ g.moveTo(pts[i-1][0],pts[i-1][1]); g.lineTo(pts[i][0],pts[i][1]); }
    g.lineStyle(0);
  },()=>{ atkLayer.removeChild(g); res(); }));
}

function shockwave(cx,cy,col,maxR,dur){
  const g=new PIXI.Graphics(); atkLayer.addChild(g);
  return new Promise(res=>anim(dur,t=>{
    g.clear();
    const r=maxR*easeOut(t), a=(1-t)*0.8;
    g.lineStyle(6,col,a*0.3); g.drawCircle(cx,cy,r+8); g.lineStyle(0);
    g.lineStyle(3,col,a*0.7); g.drawCircle(cx,cy,r);   g.lineStyle(0);
    g.lineStyle(1,0xffffff,a);g.drawCircle(cx,cy,r-3); g.lineStyle(0);
  },()=>{ atkLayer.removeChild(g); res(); }));
}

function starBurst(cx,cy,col,count,len,dur){
  const g=new PIXI.Graphics(); atkLayer.addChild(g);
  const angles=Array.from({length:count},(_,i)=>i*(Math.PI*2/count)+Math.random()*0.2);
  return new Promise(res=>anim(dur,t=>{
    g.clear();
    const a=Math.max(0,1-t), l=len*easeOut(t);
    angles.forEach(angle=>{
      const ex2=cx+Math.cos(angle)*l, ey2=cy+Math.sin(angle)*l;
      g.lineStyle(4,col,a*0.3); g.moveTo(cx,cy); g.lineTo(ex2,ey2);
      g.lineStyle(2,col,a*0.7); g.moveTo(cx,cy); g.lineTo(ex2,ey2);
      g.lineStyle(1,0xffffff,a*0.9);
      g.moveTo(cx,cy);
      g.lineTo(cx+(ex2-cx)*(0.3+t*0.7),cy+(ey2-cy)*(0.3+t*0.7));
    });
    g.lineStyle(0);
  },()=>{ atkLayer.removeChild(g); res(); }));
}

function fireColumn(x,y,dur){
  const g=new PIXI.Graphics(); atkLayer.addChild(g);
  const pts=Array.from({length:30},()=>({
    x:x+(Math.random()-0.5)*30, y, vy:-(60+Math.random()*80),
    size:4+Math.random()*8, life:Math.random()
  }));
  return new Promise(res=>anim(dur,t=>{
    g.clear(); const dts=0.016;
    pts.forEach(p=>{
      p.y+=p.vy*dts; p.vy*=0.98; p.life+=dts*1.5; p.x+=(Math.random()-0.5)*2;
      const a=Math.max(0,Math.min(1,p.life<0.3?p.life/0.3:1-((p.life-0.3)/0.7)));
      if(a>0){
        g.beginFill(p.life<0.4?C.fire:p.life<0.7?C.orange:C.gold,a*0.9);
        g.drawRect(p.x-p.size/2,p.y-p.size/2,p.size*(1-t*0.5),p.size*(1-t*0.5));
        g.endFill();
      }
      if(p.life>=1){ p.x=x+(Math.random()-0.5)*30; p.y=y; p.vy=-(60+Math.random()*80); p.life=0; }
    });
  },()=>{ atkLayer.removeChild(g); res(); }));
}

// Sparks flying outward from impact point
function impactSparks(cx,cy,col,count,dur){
  const g=new PIXI.Graphics(); atkLayer.addChild(g);
  const ps=Array.from({length:count},()=>{
    const a=Math.random()*Math.PI*2;
    const spd=80+Math.random()*180;
    return {x:cx,y:cy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-40,life:1,size:2+Math.random()*4};
  });
  return new Promise(res=>anim(dur,()=>{
    g.clear(); const dts=0.016;
    ps.forEach(p=>{
      p.x+=p.vx*dts; p.y+=p.vy*dts; p.vy+=300*dts; p.life-=1.4*dts;
      if(p.life>0){
        g.beginFill(col,p.life*0.9); g.drawRect(p.x,p.y,p.size,p.size); g.endFill();
        g.beginFill(0xffffff,p.life*0.4); g.drawRect(p.x,p.y,p.size*0.5,p.size*0.5); g.endFill();
      }
    });
  },()=>{ atkLayer.removeChild(g); res(); }));
}

// Energy orbs converging to a point (charge-up before attack)
function energyConverge(tx,ty,col,count,dur){
  const g=new PIXI.Graphics(); atkLayer.addChild(g);
  const orbs=Array.from({length:count},(_,i)=>{
    const a=i*(Math.PI*2/count)+Math.random()*0.5;
    const dist=50+Math.random()*80;
    return {sx:tx+Math.cos(a)*dist,sy:ty+Math.sin(a)*dist,a};
  });
  return new Promise(res=>anim(dur,t=>{
    g.clear();
    orbs.forEach(o=>{
      const x=lerp(o.sx,tx,easeIn(t)), y=lerp(o.sy,ty,easeIn(t));
      const a=(1-t)*0.9, r=4*(1-t)+1;
      g.beginFill(col,a*0.5); g.drawCircle(x,y,r*2); g.endFill();
      g.beginFill(0xffffff,a); g.drawCircle(x,y,r); g.endFill();
    });
  },()=>{ atkLayer.removeChild(g); res(); }));
}

// Big impact crater ring + debris
function craterBurst(cx,cy,col,dur){
  const g=new PIXI.Graphics(); atkLayer.addChild(g);
  const chunks=Array.from({length:16},()=>{
    const a=Math.random()*Math.PI*2;
    const spd=60+Math.random()*120;
    return {x:cx,y:cy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-30,life:1,w:3+Math.random()*6,h:2+Math.random()*4};
  });
  return new Promise(res=>anim(dur,t=>{
    g.clear(); const dts=0.016;
    const ra=(1-t)*0.7, rr=(cx*0.35)*easeOut(t);
    g.lineStyle(8,col,ra*0.25); g.drawCircle(cx,cy,rr+10); g.lineStyle(0);
    g.lineStyle(4,col,ra*0.6); g.drawCircle(cx,cy,rr); g.lineStyle(0);
    g.lineStyle(2,0xffffff,ra); g.drawCircle(cx,cy,rr-4); g.lineStyle(0);
    chunks.forEach(p=>{
      p.x+=p.vx*dts; p.y+=p.vy*dts; p.vy+=280*dts; p.life-=1.2*dts;
      if(p.life>0){
        g.beginFill(col,p.life*0.8); g.drawRect(p.x,p.y,p.w,p.h); g.endFill();
      }
    });
  },()=>{ atkLayer.removeChild(g); res(); }));
}

// Horizontal slash wave that sweeps across enemy
function slashWave(cx,cy,col,dur){
  const g=new PIXI.Graphics(); atkLayer.addChild(g);
  return new Promise(res=>anim(dur,t=>{
    g.clear();
    const a=Math.max(0,1-t*1.2);
    const w=120*easeOut(t), h=8+t*4;
    g.beginFill(col,a*0.15); g.drawEllipse(cx,cy,w+12,h+8); g.endFill();
    g.beginFill(col,a*0.5);  g.drawEllipse(cx,cy,w,h); g.endFill();
    g.beginFill(0xffffff,a*0.9); g.drawEllipse(cx,cy,w*0.6,h*0.4); g.endFill();
  },()=>{ atkLayer.removeChild(g); res(); }));
}

// Ice crystal shatter effect
function iceShard(cx,cy,dur){
  const g=new PIXI.Graphics(); atkLayer.addChild(g);
  const shards=Array.from({length:12},(_,i)=>{
    const a=i*(Math.PI*2/12);
    return {a, dist:0, spd:40+Math.random()*60};
  });
  return new Promise(res=>anim(dur,t=>{
    g.clear();
    shards.forEach(s=>{
      const d=(s.dist+s.spd*0.016)*easeOut(t)*80;
      const x=cx+Math.cos(s.a)*d, y=cy+Math.sin(s.a)*d*0.6;
      const al=Math.max(0,1-t*1.1);
      const sz=5*(1-t*0.8);
      g.beginFill(C.ice,al*0.5); g.drawPolygon([x,y-sz*2,x+sz,y+sz,x-sz,y+sz]); g.endFill();
      g.beginFill(0xffffff,al*0.7); g.drawPolygon([x,y-sz,x+sz*0.5,y+sz*0.5,x-sz*0.5,y+sz*0.5]); g.endFill();
    });
  },()=>{ atkLayer.removeChild(g); res(); }));
}

// Hero glows and pulses before attack
function heroChargeGlow(col,dur){
  const g=new PIXI.Graphics(); atkLayer.addChild(g);

    g.clear();

// Dramatic zoom-in vignette for big attacks
function vignetteFlash(col,dur){

// Enemy flash white/red when hit
function enemyHitFlash(col=0xffffff,dur=100){

// ── Character movement ────────────────────────────────────────────────────────
function heroDash(tx,ty,dur){
  return new Promise(res=>{

      heroTrail.unshift({x:heroSpr.x,y:heroSpr.y,alpha:0.8});

    anim(dur,t=>{
      heroSpr.x=lerp(sx,tx,easeOut(t));
      heroSpr.y=lerp(sy,ty,easeOut(t));

  });
}

// ── Player attack animations by tier ─────────────────────────────────────────
async function playAttackAnim(tier, score, col){
  const ex=enemyBase.x, ey=enemyBase.y;
  const mid={x:(heroBase.x+ex)/2, y:(heroBase.y+ey)/2};

  if(tier===0){
    // High Die — quick lunge + single slash
    await Promise.all([
      heroChargeGlow(C.white, 140),
      energyConverge(ex,ey,C.white,5,200),
    ]);
    await Promise.all([
      heroDash(heroBase.x+44, heroBase.y-28, 160),
      slashArc(mid.x,mid.y,72, Math.PI*0.6,Math.PI*1.4, C.white,260),
    ]);
    await Promise.all([
      slashWave(ex,ey,C.white,200),
      enemyHitFlash(0xffffff,90),
    ]);
    shake(4,200); impactSparks(ex,ey,C.white,10,350);

  } else if(tier===1){
    // One Pair — charge + double slash
    await heroChargeGlow(C.green,160);
    await heroDash(mid.x,mid.y-18,170);
    await Promise.all([
      slashArc(ex,ey,84,Math.PI*0.4,Math.PI*1.5,C.green,300),
      slashArc(ex,ey,52,Math.PI*1.1,Math.PI*0.3,C.white,260),
      slashWave(ex,ey,C.green,280),
      enemyHitFlash(0xaaffaa,100),
    ]);
    shake(6,230);
    impactSparks(ex,ey,C.green,14,400);
    burst(ex,ey,C.green,10);

  } else if(tier===2){
    // Two Pair — converge energy + triple slash + shockwave
    await Promise.all([
      heroChargeGlow(C.blue,180),
      energyConverge(ex,ey,C.cyan,8,240),
    ]);
    await heroDash(mid.x-18,mid.y-10,150);
    await Promise.all([
      slashArc(ex,ey,92,Math.PI*0.3,Math.PI*1.6,C.blue,320),
      slashArc(ex,ey,62,Math.PI*1.2,Math.PI*0.2,C.cyan,280),
      shockwave(ex,ey,C.cyan,84,360),
      slashWave(ex,ey,C.blue,300),
      enemyHitFlash(0xaaddff,110),
    ]);
    shake(8,270);
    impactSparks(ex,ey,C.cyan,18,450);
    burst(ex,ey,C.cyan,14);

  } else if(tier===3){
    // Three of a Kind — fire charge + triple slash + fire column
    screenFlash(C.orange,80);
    await Promise.all([
      heroChargeGlow(C.fire,200),
      energyConverge(ex,ey,C.fire,10,250),
    ]);
    await heroDash(ex-38,ey+18,140);
    await Promise.all([
      slashArc(ex,ey,102,Math.PI*0.1,Math.PI*1.7,C.orange,360),
      slashArc(ex,ey,72,Math.PI*1.4,Math.PI*0.4,C.fire,310),
      slashArc(ex,ey,46,Math.PI*0.7,Math.PI*0.1,C.gold,285),
      fireColumn(ex,ey+28,520),
      shockwave(ex,ey,C.fire,105,420),
      slashWave(ex,ey,C.fire,320),
    ]);
    await Promise.all([
      enemyHitFlash(0xff8800,130),
      craterBurst(ex,ey,C.fire,500),
    ]);
    shake(12,360);
    impactSparks(ex,ey,C.fire,22,500);
    burst(ex,ey,C.fire,20); burst(ex,ey,C.gold,10);

  } else if(tier===4){
    // Full House — purple vignette + mega combo
    vignetteFlash(C.purple,500);
    await Promise.all([
      heroChargeGlow(C.purple,220),
      energyConverge(ex,ey,C.purple,14,280),
    ]);
    screenFlash(C.purple,100);
    await heroDash(ex,ey+28,130);
    await Promise.all([
      slashArc(ex,ey,114,Math.PI*0.0,Math.PI*1.8,C.purple,390),
      slashArc(ex,ey,82,Math.PI*1.5,Math.PI*0.2,C.purple,350),
      slashArc(ex,ey,56,Math.PI*0.5,Math.PI*1.2,C.white,310),
      starBurst(ex,ey,C.purple,14,85,460),
      shockwave(ex,ey,C.purple,136,520),
      iceShard(ex,ey,400),
    ]);
    await Promise.all([
      enemyHitFlash(0xdd88ff,150),
      craterBurst(ex,ey,C.purple,600),
    ]);
    shake(16,420); screenFlash(C.purple,60);
    impactSparks(ex,ey,C.purple,26,550);
    burst(ex,ey,C.purple,26); burst(ex,ey,C.gold,14);

  } else if(tier===5){
    // Four of a Kind — lightning storm
    vignetteFlash(C.gold,600);
    screenFlash(C.orange,150); shake(5,200);
    await Promise.all([
      heroChargeGlow(C.gold,250),
      energyConverge(ex,ey,C.gold,16,300),
      lightningBolt(ex,-20,ey,C.gold,420),
    ]);
    await heroDash(ex-18,ey+38,120);
    await Promise.all([
      slashArc(ex,ey,122,Math.PI*0.0,Math.PI*2.0,C.gold,410),
      slashArc(ex,ey,88,Math.PI*1.0,Math.PI*0.0,C.orange,370),
      slashArc(ex,ey,56,Math.PI*0.5,Math.PI*1.5,C.white,330),
      slashArc(ex,ey,32,Math.PI*1.3,Math.PI*0.7,C.gold,290),
      shockwave(ex,ey,C.gold,164,560),
      starBurst(ex,ey,C.gold,18,115,510),
      lightningBolt(ex-30,-20,ey+10,C.cyan,350),
      lightningBolt(ex+30,-20,ey+10,C.white,320),
    ]);
    await Promise.all([
      enemyHitFlash(0xffdd44,160),
      craterBurst(ex,ey,C.gold,650),
    ]);
    shake(20,520); screenFlash(C.gold,100);
    impactSparks(ex,ey,C.gold,32,600);
    burst(ex,ey,C.gold,30); burst(ex,ey,C.orange,18); burst(ex,ey,C.white,12);

  } else {
    // FIVE OF A KIND — ULTRA
    const dark=new PIXI.Graphics(); dark.beginFill(0x000000,0.0); dark.drawRect(0,0,W,H); dark.endFill();
    Lpopup.addChild(dark);
    await new Promise(r=>anim(350,t=>dark.alpha=t*0.9,r));

    const ult=new PIXI.Text('FIVE OF A KIND',{fontFamily:FONT,fontSize:14,fill:'#ffd700',align:'center'});
    ult.anchor.set(0.5); ult.position.set(W/2,H/2); ult.scale.set(0);
    Lpopup.addChild(ult);
    await new Promise(r=>anim(450,t=>ult.scale.set(easeBack(t)*1.15),r));
    await wait(450);

    heroSpr.tint=0xffd700;
    await Promise.all([
      heroChargeGlow(C.gold,300),
      energyConverge(ex,ey,C.gold,24,350),
      new Promise(r=>anim(300,t=>dark.alpha=0.9-t*0.9,r)),
    ]);
    Lpopup.removeChild(dark); Lpopup.removeChild(ult);

    vignetteFlash(C.gold,800);
    await heroDash(ex,ey+18,110); shake(8,220);
    await Promise.all([
      slashArc(ex,ey,142,0,Math.PI*2,C.gold,520),
      slashArc(ex,ey,108,Math.PI*0.5,Math.PI*2.5,C.orange,500),
      slashArc(ex,ey,78,Math.PI*1.0,Math.PI*3.0,C.white,480),
      slashArc(ex,ey,48,Math.PI*1.5,Math.PI*3.5,C.gold,460),
      lightningBolt(ex,-20,ey,C.gold,320),
      lightningBolt(ex-65,-20,ey+20,C.cyan,300),
      lightningBolt(ex+65,-20,ey+20,C.white,280),
      starBurst(ex,ey,C.gold,28,168,620),
      shockwave(ex,ey,C.gold,228,720),
      shockwave(ex,ey,C.white,290,840),
      iceShard(ex,ey,500),
      fireColumn(ex,ey+20,600),
    ]);
    await Promise.all([
      enemyHitFlash(0xffffff,200),
      craterBurst(ex,ey,C.gold,700),
    ]);
    shake(30,750); screenFlash(C.white,220);
    await wait(120); screenFlash(C.gold,120);
    impactSparks(ex,ey,C.gold,40,700);
    impactSparks(ex,ey,C.white,24,650);
    burst(ex,ey,C.gold,38); burst(ex,ey,C.white,22);
    burst(ex,ey,C.orange,18); burst(ex,ey,C.cyan,14);
    heroSpr.tint=0xffffff;
  }

  await heroReturn(200);
  await enemyKnock(tier>=5?-44:tier>=3?-32:tier>=1?-16:-9, 320);
}

async function tallyScore(result){
  return new Promise(res=>{
    let displayC=0;
    const step=Math.max(1,Math.ceil(result.chips/24));
    anim(600,()=>{
      displayC=Math.min(displayC+step,result.chips);
      if(_chTxt){ _chTxt.text=String(displayC); _scorTxt.text=String(displayC*result.mult); }
    },res);
  });
}

// ── Enemy turn: animated attack sequence ──────────────────────────────────────
async function doEnemyTurn(result){
  G.phase='enemyTurn';
  const intent=G.intent;

  // Show big "ENEMY TURN" indicator
  const etxt=new PIXI.Text('ENEMY TURN',{fontFamily:FONT,fontSize:16,fill:'#ff4567',align:'center'});
  etxt.anchor.set(0.5); etxt.position.set(W/2, H*0.45); etxt.alpha=0;
  Lpopup.addChild(etxt);
  await new Promise(r=>anim(250,t=>etxt.alpha=t,r));
  await wait(350);
  await new Promise(r=>anim(250,t=>etxt.alpha=1-t,r));
  Lpopup.removeChild(etxt);

  if(intent.type==='guard'){
    const shAmt=30+G.wave*3;
    G.enemyShield+=shAmt;
    await Promise.all([
      shockwave(enemyBase.x,enemyBase.y,C.cyan,90,400),
      shockwave(enemyBase.x,enemyBase.y,C.white,60,300),
      energyConverge(enemyBase.x,enemyBase.y,C.cyan,10,350),
      new Promise(r=>{ smallPopup(enemyBase.x,enemyBase.y-28,`+SHIELD ${shAmt}`,C.cyan); setTimeout(r,450); }),
    ]);
  } else {
    // Enemy dashes at hero
    await enemyDash(heroBase.x, heroBase.y-60, 200);

    let dmg=intent.dmg;
    let guard=result.tier*3+Math.min(8,G.combo);
    if(result.tier>=4) guard+=6;
    dmg=Math.max(0,dmg-guard-G.block);
    G.block=0;

    if(intent.type==='curse'){
      const d=G.dice[Math.floor(Math.random()*G.dice.length)];
      if(d){ d.value=Math.max(1,d.value-1); d.vy=-24; }
      smallPopup(W/2,UI.diceY-55,'DIE WEAKENED',C.purple);
    }
    if(dmg>0){
      G.pHP=Math.max(0,G.pHP-dmg);
      screenFlash(C.hp,150);
      bigDmgText(heroBase.x, heroBase.y-34, `-${dmg}`, C.red);
      impactSparks(heroBase.x,heroBase.y,C.red,16,400);
      shake(intent.type==='heavy'?14:9, 320);
    } else {
      shockwave(heroBase.x,heroBase.y,C.cyan,60,350);
      smallPopup(heroBase.x,heroBase.y-34,'BLOCKED',C.cyan);
      burst(heroBase.x,heroBase.y,C.cyan,14);
    }
    await wait(200);
    await enemyReturn(180);
  }

  G.intent=makeEnemyIntent();
}

// ── Game actions ──────────────────────────────────────────────────────────────
async function onPlayHand(){
  if(G.busy||G.phase!=='roll') return;
  G.busy=true; G.phase='attacking';

  const active=G.dice.filter(d=>d.held);
  const toScore=active.length?active:G.dice;
  const result=evalHand(toScore);

  G.blazeNextMult=1;
  G.focus=0;

  const col=HAND_COLS[result.tier];
  if(_handTxt){ _handTxt.text=result.hand.name; _handTxt.style.fill=col; }

  bigPopup(result.hand.name, col, result.tier>=4?2:result.tier>=2?1.5:1.2);
  await playAttackAnim(result.tier, result.score, col);
  await tallyScore(result);

  let dealt=result.score;
  if(G.enemyShield>0){
    const blocked=Math.min(G.enemyShield,dealt);
    G.enemyShield-=blocked; dealt-=blocked;
    smallPopup(enemyBase.x,enemyBase.y-34,`SHIELD -${blocked}`,C.cyan);
  }
  G.eHP=Math.max(0,G.eHP-dealt);
  bigDmgText(enemyBase.x,enemyBase.y-50,`-${dealt}`,col);
  G.combo=result.tier>=1?G.combo+1:0;
  if(result.tier>=3){
    G.block+=8+result.tier*2;
    smallPopup(heroBase.x,heroBase.y-44,`BLOCK +${8+result.tier*2}`,C.cyan);
  }

  if(G.eHP<=0){
    // Wave cleared — no card panel, just XP and next wave
    screenFlash(C.hpG,250);
    burst(enemyBase.x,enemyBase.y,0x55ee33,30);
    burst(enemyBase.x,enemyBase.y,C.gold,18);
    await wait(500);
    const xpGain=20+G.wave*10;
    addXP(xpGain);
    smallPopup(W/2,H*0.4,`+${xpGain} XP`,C.xpC);
    // Small heal each wave
    const healAmt=10;
    G.pHP=Math.min(G.pMaxHP,G.pHP+healAmt);
    smallPopup(W/2,H*0.48,`+${healAmt} HP`,C.hpG);
    bigPopup(`WAVE ${G.wave} CLEARED!`,C.gold,1.5);
    await wait(1200);
    nextRound();
  } else {
    // Enemy counter-attack
    await doEnemyTurn(result);
    if(G.pHP<=0){ showGameOver(); return; }
    G.phase='roll'; G.busy=false;
    rollUnheld();
    G.dice.forEach(d=>d.held=false);
    rebuildDiceZones();
    buildAbilityBar();
  }
}

function onDiscard(){
  if(G.busy||G.phase!=='roll') return;
  if(G.discardsLeft<=0){ smallPopup(W/2,400,'NO REROLLS LEFT',C.red); return; }
  const toReroll=G.dice.filter(d=>!d.held);
  if(!toReroll.length){ smallPopup(W/2,400,'HOLD DICE TO KEEP',C.orange); return; }
  G.discardsLeft--;
  // Reroll unheld dice — held dice keep their value AND stay floating
  toReroll.forEach(d=>{ d.value=Math.ceil(Math.random()*6); d.vy=-60; });
  rebuildDiceZones();
}

// ── Abilities (unlocked by XP) ────────────────────────────────────────────────
async function useAbility(i){
  const ab=G.abilities[i];
  if(!ab||!ab.unlocked||!ab.ready||G.busy||G.phase!=='roll') return;
  ab.ready=false; G.busy=true;

  if(ab.id==='blaze'){
    screenFlash(C.fire,100);
    await Promise.all([
      heroDash(enemyBase.x,enemyBase.y+30,150),
      fireColumn(enemyBase.x,enemyBase.y+20,600),
    ]);
    const dmg=60+G.wave*2;
    G.eHP=Math.max(0,G.eHP-dmg);
    bigDmgText(enemyBase.x,enemyBase.y-40,`BLAZE -${dmg}`,C.fire);
    G.blazeNextMult=2;
    smallPopup(W/2,H*0.5,'MULT x2 NEXT HAND',C.orange);
    await heroReturn(200); shake(10,300);

  } else if(ab.id==='thunder'){
    const dmg=Math.ceil(G.eMaxHP*0.3);
    await Promise.all([
      lightningBolt(enemyBase.x,-30,enemyBase.y,C.gold,500),
      lightningBolt(enemyBase.x-30,-30,enemyBase.y+10,C.cyan,450),
      lightningBolt(enemyBase.x+30,-30,enemyBase.y+10,C.white,400),
    ]);
    G.eHP=Math.max(0,G.eHP-dmg);
    shake(16,400); screenFlash(C.gold,150);
    bigDmgText(enemyBase.x,enemyBase.y-50,`THUNDER -${dmg}`,C.gold);
    burst(enemyBase.x,enemyBase.y,C.gold,24);

  } else if(ab.id==='frost'){
    const g2=new PIXI.Graphics(); g2.beginFill(C.ice,0.3); g2.drawRect(0,0,W,H); g2.endFill();
    Lpopup.addChild(g2);
    await Promise.all([shockwave(W/2,H/2,C.ice,200,400), starBurst(W/2,H/2,C.ice,16,120,350)]);
    screenFlash(C.ice,200);
    G.blazeNextMult=3;
    smallPopup(W/2,H*0.5,'FROST: MULT x3',C.ice);
    setTimeout(()=>Lpopup.removeChild(g2),300);

  } else if(ab.id==='deathspin'){
    const best=G.dice.map(d=>d.value);
    for(let r=0;r<3;r++){
      await wait(150);
      G.dice.forEach((d,i)=>{ const nv=Math.ceil(Math.random()*6); if(nv>best[i])best[i]=nv; d.vy=-40; });
    }
    G.dice.forEach((d,i)=>{ d.value=best[i]; d.held=false; });
    screenFlash(C.purple,200); burst(W/2,H*0.55,C.purple,28);
    smallPopup(W/2,H*0.5,'DEATH SPIN: BEST VALUES',C.purple);
    rebuildDiceZones();
  }

  if(G.eHP<=0){
    screenFlash(C.hpG,220);
    burst(enemyBase.x,enemyBase.y,0x55ee33,28);
    const xpGain=20+G.wave*10;
    addXP(xpGain);
    smallPopup(W/2,H*0.4,`+${xpGain} XP`,C.xpC);
    bigPopup(`WAVE ${G.wave} CLEARED!`,C.gold,1.5);
    await wait(1000);
    G.busy=false;
    nextRound();
    return;
  }
  G.busy=false;
  buildAbilityBar();
}

// ── Next round (no joker panel) ───────────────────────────────────────────────
function nextRound(){
  G.wave++;
  G.discardsLeft=3;
  G.combo=0; G.block=0; G.focus=0;
  G.abilities.forEach(ab=>{ if(ab.unlocked) ab.ready=true; });
  spawnEnemy();
  freshRoll();
  rebuildDiceZones();
  buildAbilityBar();
  G.busy=false; G.phase='roll';
  smallPopup(W/2,H*0.35,`WAVE ${G.wave}`,C.gold);
}

// ── Game over ─────────────────────────────────────────────────────────────────
function showGameOver(){
  G.phase='dead'; G.busy=true;
  Lover.removeChildren();
  shake(20,600); screenFlash(C.red,400);
  setTimeout(()=>{
    const ov=new PIXI.Graphics(); ov.beginFill(0x000000,0.88); ov.drawRect(0,0,W,H); ov.endFill();
    Lover.addChild(ov);
    const g=new PIXI.Text('GAME OVER',{fontFamily:FONT,fontSize:22,fill:'#ff3355',align:'center'});
    g.anchor.set(0.5); g.position.set(W/2,H*0.36); Lover.addChild(g);
    const w=new PIXI.Text(`WAVE ${G.wave}  ·  LV ${G.level}`,{fontFamily:FONT,fontSize:8,fill:'#ccaaff',align:'center'});
    w.anchor.set(0.5); w.position.set(W/2,H*0.5); Lover.addChild(w);
    const r=new PIXI.Text('TAP TO RETRY',{fontFamily:FONT,fontSize:9,fill:'#ffd700',align:'center'});
    r.anchor.set(0.5); r.position.set(W/2,H*0.64); r.eventMode='static'; r.cursor='pointer';
    r.on('pointertap',()=>{ Lover.removeChildren(); newGame(); rebuildDiceZones(); buildAbilityBar(); });
    Lover.addChild(r);
    let rb=false;
    app.ticker.add(function blink(){ rb=!rb; r.alpha=rb?1:0.35; if(G.phase!=='dead')app.ticker.remove(blink); });
  },900);
}

// ── Init & main loop ──────────────────────────────────────────────────────────
bakeAll();
newGame();
buildWorld();
buildUITexts();
drawPanels();
buildButtons();
buildAbilityBar();
rebuildDiceZones();

app.ticker.add(()=>{
  G.tick+=app.ticker.deltaMS;
  if(G.phase==='dead') return;
  drawBG();
  drawWorld();
  drawDice();
  drawButtons();
  drawBars();
  drawAbilityBar();
  if(G.phase==='roll') updateScorePanel();
});
</script>
