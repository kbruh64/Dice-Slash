// ── Easing ────────────────────────────────────────────────────────────────────
const easeOut  = t => 1-(1-t)**2;
const easeIn   = t => t*t;
const easeBack = t => 2.7*t*t*t - 1.7*t*t;
const easeBounce= t => Math.abs(Math.sin(t*Math.PI));

// ── Animation helpers ─────────────────────────────────────────────────────────
function anim(dur, onFrame, onDone) {
  dur=Math.max(1,dur*(SETTINGS.reduceMotion?0.35:SETTINGS.fastAnims?0.65:1));
  let elapsed=0;
  const tick=()=>{
    elapsed+=app.ticker.deltaMS;
    const t=Math.min(1,elapsed/dur);
    onFrame(t);
    if(t>=1){ app.ticker.remove(tick); onDone?.(); }
  };
  app.ticker.add(tick);
  return ()=>app.ticker.remove(tick);
}
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }
async function seq(steps){ for(const s of steps) await s(); }
function lerp(a,b,t){ return a+(b-a)*t; }

function normArt(art){
  const mw=Math.max(...art.map(r=>r.length));
  return art.map(r=>r.padEnd(mw,'.'));
}

// ── Sprite baking ─────────────────────────────────────────────────────────────
function bakeSprite(spr, px=PX){
  const g=new PIXI.Graphics();
  spr.art.forEach((row,sy)=>{
    for(let sx=0;sx<row.length;sx++){
      const col=spr.pal[row[sx]]; if(!col) continue;
      g.beginFill(col); g.drawRect(sx*px,sy*px,px,px); g.endFill();
    }
  });
  const rt=PIXI.RenderTexture.create({width:spr.w*px,height:spr.h*px});
  app.renderer.render(g,{renderTexture:rt});
  return rt;
}
function bakeIcon(spr){return bakeSprite(spr,2);}

function spawnEnemy(){
  const diff=SETTINGS.difficulty==='chill'?0.82:SETTINGS.difficulty==='brutal'?1.18:1;
  G.eMaxHP=Math.round((80+G.wave*50)*diff);
  G.eHP=G.eMaxHP;
  G.enemyShield=0;
  G.intent=makeEnemyIntent();
}

function makeEnemyIntent(){
  const diff=SETTINGS.difficulty==='chill'?0.8:SETTINGS.difficulty==='brutal'?1.25:1;
  const base=Math.round((7+G.wave*3)*diff);
  const r=Math.random();
  if(r<0.48) return {type:'strike',name:'STRIKE',dmg:base,desc:`-${base} HP`};
  if(r<0.72) return {type:'heavy',name:'HEAVY',dmg:base+7,desc:`-${base+7} HP`};
  if(r<0.88) return {type:'guard',name:'GUARD',dmg:0,desc:'+25 SHIELD'};
  return {type:'curse',name:'CURSE',dmg:Math.max(4,base-3),desc:'WEAKEN DICE'};
}

function freshRoll(){
  G.dice=Array.from({length:G.diceCount},(_, i)=>({
    value:Math.ceil(Math.random()*6),
    held:false,
    el:G.dice[i]?.el||'none',
    vy:-60,
  }));
  if(SETTINGS.autoSort) sortDice();
}

function rollUnheld(){
  G.dice.forEach(d=>{
    if(!d.held){ d.value=Math.ceil(Math.random()*6); d.vy=-50; }
  });
  if(SETTINGS.autoSort) sortDice();
}

function sortDice(){
  G.dice.sort((a,b)=>a.value-b.value || (a.el||'').localeCompare(b.el||''));
}

function evalHand(dice){
  const vals=dice.map(d=>d.value);
  const freq={}; vals.forEach(v=>{freq[v]=(freq[v]||0)+1;});
  const counts=Object.values(freq).sort((a,b)=>b-a);
  const max=counts[0], sec=counts[1]||0;
  let h=0;
  if(max===5)h=6; else if(max===4)h=5;
  else if(max===3&&sec===2)h=4; else if(max===3)h=3;
  else if(max===2&&sec===2)h=2; else if(max===2)h=1;
  const hand=HANDS[h];
  const base=vals.reduce((a,b)=>a+b,0)+hand.chips;
  let em=1;
  dice.forEach(d=>{
    if(d.el==='fire')  em+=0.4;
    if(d.el==='ice')   em+=0.2;
    if(d.el==='poison')em+=0.3;
  });
  // Joker bonuses
  let jChips=0, jMult=0;
  G.jokers.forEach(j=>{
    if(j.type==='chips') jChips+=j.val;
    if(j.type==='mult')  jMult +=j.val;
  });
  const comboBoost=Math.min(6,G.combo);
  const chips=Math.round(base*em)+jChips+comboBoost*2;
  const mult =hand.mult+jMult+(G.blazeNextMult-1)+(G.focus||0);
  return {tier:h,hand,chips,mult,score:chips*mult};
}

  });
}

    enemySpr.visible=true;

    // Enemy HP bar
    const bw=136,bh=10,bx=enemyBase.x-bw/2,by=enemyBase.y-bob+62;
    worldG.beginFill(0x16314a,0.85); worldG.drawRoundedRect(bx,by,bw,bh,4); worldG.endFill();
    const hf=Math.max(0,G.eHP/G.eMaxHP);
    worldG.beginFill(hf>0.5?C.hpG:hf>0.25?C.orange:C.hp);
    worldG.drawRoundedRect(bx+1,by+1,(bw-2)*hf,bh-2,3); worldG.endFill();
    worldG.beginFill(0xffffff,0.35); worldG.drawRoundedRect(bx+3,by+2,(bw-8)*hf*0.5,2,1); worldG.endFill();
    worldG.lineStyle(1,0xffffff,0.55); worldG.drawRoundedRect(bx,by,bw,bh,4); worldG.lineStyle(0);
  } else if(enemySpr) {
    enemySpr.visible=false;
  }

  // Hero aura pulse
  if(heroSpr){
    const auraCol=G.abilities[0].ready?C.fire:G.abilities[1].ready?C.cyan:C.purple;
    const ap=0.12+0.08*Math.abs(Math.sin(t*0.005));
    fxG.beginFill(auraCol,ap*1.8); fxG.drawCircle(heroSpr.x,heroSpr.y,54); fxG.endFill();
    fxG.beginFill(0xffffff,ap*0.48);fxG.drawCircle(heroSpr.x,heroSpr.y,72); fxG.endFill();
    fxG.beginFill(0x000000,0.18);   fxG.drawEllipse(heroSpr.x,heroSpr.y+38,58,13); fxG.endFill();
    // motion trail
    heroTrail.forEach((tr,i)=>{
      const a=tr.alpha*(1-i/heroTrail.length)*0.4;
      if(a>0.01){
        fxG.beginFill(C.purple,a);
        fxG.drawRect(tr.x-14,tr.y-18,28,36);
        fxG.endFill();
      }
    });
  }

  // Wave/enemy name
  if(_waveTxt){
    _waveTxt.text=`WAVE ${G.wave}`;
    _eLvlTxt.text=`${Math.ceil(G.eHP)}/${G.eMaxHP} HP${G.enemyShield>0?`  SH ${G.enemyShield}`:''}`;
  }
}

// ── Dice rendering ────────────────────────────────────────────────────────────
const diceG=new PIXI.Graphics(); Ldice.addChild(diceG);
let diceZones=[];
const DSZ=50;

function rebuildDiceZones(){
  diceZones.forEach(z=>Ldice.removeChild(z)); diceZones=[]; 
  const n=G.dice.length;
  const DS=SETTINGS.largeDice?56:DSZ;
  const spc=Math.min(DS+8,(W-38)/n);
  const sx=W/2-spc*(n-1)/2;
  G.dice.forEach((d,i)=>{
    const cx=sx+i*spc;
    const z=new PIXI.Graphics();
    z.beginFill(0xffffff,0.001); z.drawRoundedRect(cx-DS/2-9,UI.diceY-DS/2-9,DS+18,DS+18,9); z.endFill();
    z.eventMode='static'; z.cursor='pointer';
    z.on('pointertap',()=>toggleHold(i));
    Ldice.addChild(z); diceZones.push(z);
  });
}

function toggleHold(i){
  if(G.busy||G.phase!=='roll') return;
  G.dice[i].held=!G.dice[i].held;
  G.dice[i].vy=G.dice[i].held?-12:10;
}

function drawDice(){
  diceG.clear();
  const n=G.dice.length;
  const DS=SETTINGS.largeDice?56:DSZ;
  const spc=Math.min(DS+8,(W-38)/n);
  const sx=W/2-spc*(n-1)/2;

  G.dice.forEach((d,i)=>{
    // spring physics
    d.vy=(d.vy||0)*0.72;
    const cy=UI.diceY+d.vy;
    const cx=sx+i*spc;
    const ec=EL_COL[d.el||'none'];
    const held=d.held;
    const heldY=held?-20:0;

    // Elemental outer double-glow
    if(ec){
      diceG.beginFill(ec,0.18); diceG.drawRoundedRect(cx-DS/2-11,cy-DS/2-11+heldY,DS+22,DS+22,10); diceG.endFill();
      diceG.beginFill(ec,0.28); diceG.drawRoundedRect(cx-DS/2-6,cy-DS/2-6+heldY,DS+12,DS+12,8); diceG.endFill();
    }

    // HELD golden selector
    if(held){
      diceG.beginFill(C.gold,0.18); diceG.drawRoundedRect(cx-DS/2-9,cy-DS/2-9+heldY,DS+18,DS+18,10); diceG.endFill();
      diceG.lineStyle(3,C.gold,0.95); diceG.drawRoundedRect(cx-DS/2-4,cy-DS/2-4+heldY,DS+8,DS+8,8); diceG.lineStyle(0);
    }

    // Shadow
    diceG.beginFill(0x2aa8bd,0.20); diceG.drawCircle(cx,cy+heldY,DS*0.78); diceG.endFill();
    diceG.beginFill(0xffffff,0.40); diceG.drawCircle(cx,cy+heldY,DS*0.58); diceG.endFill();
    diceG.beginFill(0x000000,0.22); diceG.drawRoundedRect(cx-DS/2+5,cy-DS/2+6+heldY,DS,DS,7); diceG.endFill();

    // Face
    const fcol=held?C.dieSel:C.dieW;
    diceG.beginFill(fcol); diceG.drawRoundedRect(cx-DS/2,cy-DS/2+heldY,DS,DS,7); diceG.endFill();

    // Bevel light (top+left 2px)
    diceG.beginFill(0xffffff,0.68); diceG.drawRoundedRect(cx-DS/2+3,cy-DS/2+3+heldY,DS-6,5,3); diceG.endFill();
    diceG.beginFill(0xffffff,0.35); diceG.drawRoundedRect(cx-DS/2+3,cy-DS/2+3+heldY,5,DS-6,3); diceG.endFill();
    // Bevel dark (bottom+right)
    diceG.beginFill(0x000000,0.12); diceG.drawRoundedRect(cx-DS/2+4,cy+DS/2-6+heldY,DS-8,4,2); diceG.endFill();

    // Border
    diceG.lineStyle(2,ec||0x8eeeff,1); diceG.drawRoundedRect(cx-DS/2,cy-DS/2+heldY,DS,DS,7); diceG.lineStyle(0);

    // Dots
    const dots=DOTS[d.value]||[[0,0]];
    const pad=13, dr=4;
    dots.forEach(([dpx,dpy])=>{
      const dx=cx+dpx*pad, dy=cy+dpy*pad+heldY;
      diceG.beginFill(0x000000,0.2); diceG.drawRect(dx-dr+1,dy-dr+1,dr*2,dr*2); diceG.endFill();
      diceG.beginFill(C.dieDot);     diceG.drawRect(dx-dr,dy-dr,dr*2,dr*2);     diceG.endFill();
      diceG.beginFill(0xffffff,0.4); diceG.drawRect(dx-dr,dy-dr,dr,dr);         diceG.endFill();
    });

    // Elemental corner gem
    if(ec){
      diceG.beginFill(0x000000,0.4); diceG.drawRect(cx+DS/2-12,cy-DS/2+heldY,12,12); diceG.endFill();
      diceG.beginFill(ec,1);         diceG.drawRect(cx+DS/2-11,cy-DS/2+1+heldY,10,10);diceG.endFill();
      diceG.beginFill(0xffffff,0.5); diceG.drawRect(cx+DS/2-10,cy-DS/2+2+heldY,5,5); diceG.endFill();
    }
  });

  // HELD labels (rendered above dice)
  G.dice.forEach((d,i)=>{
    if(!d.held) return;
    const cx=sx+i*spc, ty=UI.diceY-20-DS/2-12;
    diceG.beginFill(C.gold,0.95); diceG.drawRoundedRect(cx-18,ty,36,12,4); diceG.endFill();
    diceG.lineStyle(1,0xffffff,0.7); diceG.drawRoundedRect(cx-18,ty,36,12,4); diceG.lineStyle(0);
  });
}

// ── ATTACK ANIMATION ENGINE ───────────────────────────────────────────────────
// Creates spectacular animations per hand tier

const atkLayer=new PIXI.Container(); Lfx.addChild(atkLayer);

// Shake state
let shakeAmt=0, shakeTick=null;
function shake(strength, dur){
  if(!SETTINGS.shake||SETTINGS.reduceMotion) return;
  shakeAmt=strength;
  if(shakeTick) app.ticker.remove(shakeTick);
  let elapsed=0;
  shakeTick=app.ticker.add(()=>{
    elapsed+=app.ticker.deltaMS;
    const t=Math.min(1,elapsed/dur);
    app.stage.x=(Math.random()-0.5)*shakeAmt*(1-t);
    app.stage.y=(Math.random()-0.5)*shakeAmt*(1-t);
    if(t>=1){ app.stage.x=0; app.stage.y=0; app.ticker.remove(shakeTick); }
  });
}

function screenFlash(col,dur=200){
  if(!SETTINGS.flash) return;
  const g=new PIXI.Graphics(); g.beginFill(col,0.4); g.drawRect(0,0,W,H); g.endFill();
  Lpopup.addChild(g);
  setTimeout(()=>{
    let a=0.4;
    const t=app.ticker.add(()=>{a-=0.035;g.alpha=Math.max(0,a);if(a<=0){Lpopup.removeChild(g);app.ticker.remove(t);}});
  },dur);
}

// Slash arc effect
function slashArc(cx,cy,r,a0,a1,col,dur){
  const g=new PIXI.Graphics(); atkLayer.addChild(g);
  return new Promise(res=>anim(dur,t=>{
    g.clear();
    const a=Math.max(0,1-t*0.6);
    const sweep=a1+((a0-a1)*(1-easeOut(t)));
    const rr=r*(0.6+easeOut(t)*0.5);
    g.lineStyle(16,col,a*0.15); g.arc(cx,cy,rr+8,sweep,a1,false);
    g.lineStyle(8, col,a*0.4);  g.arc(cx,cy,rr,  sweep,a1,false);
    g.lineStyle(3, 0xffffff,a); g.arc(cx,cy,rr-4,sweep,a1,false);
    g.lineStyle(0);
  },()=>{ atkLayer.removeChild(g); res(); }));
}

// Lightning bolt from top
function lightningBolt(x,y1,y2,col,dur){
  const g=new PIXI.Graphics(); atkLayer.addChild(g);
  const segs=12;
  const pts=[];
  for(let i=0;i<=segs;i++){
    const py=y1+(y2-y1)*(i/segs);
    const px2=x+(Math.random()-0.5)*(i<segs?28:0);
    pts.push([px2,py]);
  }
  return new Promise(res=>anim(dur,t=>{
    g.clear();
    const a=Math.max(0,1-t*0.8);
    const n=Math.ceil(pts.length*easeOut(t));
    // outer glow
    g.lineStyle(12,col,a*0.15);
    for(let i=1;i<n;i++){ g.moveTo(pts[i-1][0],pts[i-1][1]); g.lineTo(pts[i][0],pts[i][1]); }
    // mid glow
    g.lineStyle(5,col,a*0.5);
    for(let i=1;i<n;i++){ g.moveTo(pts[i-1][0],pts[i-1][1]); g.lineTo(pts[i][0],pts[i][1]); }
    // core white
    g.lineStyle(2,0xffffff,a);
    for(let i=1;i<n;i++){ g.moveTo(pts[i-1][0],pts[i-1][1]); g.lineTo(pts[i][0],pts[i][1]); }
    g.lineStyle(0);
  },()=>{ atkLayer.removeChild(g); res(); }));
}

// Shockwave ring
function shockwave(cx,cy,col,maxR,dur){
  const g=new PIXI.Graphics(); atkLayer.addChild(g);
  return new Promise(res=>anim(dur,t=>{
    g.clear();
    const r=maxR*easeOut(t);
    const a=(1-t)*0.8;
    g.lineStyle(6,col,a*0.3); g.drawCircle(cx,cy,r+8); g.lineStyle(0);
    g.lineStyle(3,col,a*0.7); g.drawCircle(cx,cy,r);   g.lineStyle(0);
    g.lineStyle(1,0xffffff,a);g.drawCircle(cx,cy,r-3); g.lineStyle(0);
  },()=>{ atkLayer.removeChild(g); res(); }));
}

// Star burst lines from a point
function starBurst(cx,cy,col,count,len,dur){
  const g=new PIXI.Graphics(); atkLayer.addChild(g);
  const angles=Array.from({length:count},(_,i)=>i*(Math.PI*2/count)+Math.random()*0.2);
  return new Promise(res=>anim(dur,t=>{
    g.clear();
    const a=Math.max(0,1-t);
    const l=len*easeOut(t);
    angles.forEach(angle=>{
      const ex2=cx+Math.cos(angle)*l, ey2=cy+Math.sin(angle)*l;
      g.lineStyle(4,col,a*0.3); g.moveTo(cx,cy); g.lineTo(ex2,ey2);
      g.lineStyle(2,col,a*0.7); g.moveTo(cx,cy); g.lineTo(ex2,ey2);
      g.lineStyle(1,0xffffff,a*0.9);g.moveTo(cx,cy);g.lineTo(ex2*(0.3+t*0.7)+cx*(0.7-t*0.7),ey2*(0.3+t*0.7)+cy*(0.7-t*0.7));
    });
    g.lineStyle(0);
  },()=>{ atkLayer.removeChild(g); res(); }));
}

// Fire column
function fireColumn(x,y,dur){
  const g=new PIXI.Graphics(); atkLayer.addChild(g);
  const pts=Array.from({length:30},()=>({
    x:x+(Math.random()-0.5)*30, y:y, vy:-(60+Math.random()*80),
    size:4+Math.random()*8, life:Math.random()
  }));
  return new Promise(res=>anim(dur,(t)=>{
    g.clear();
    const dts=0.016;
    pts.forEach(p=>{
      p.y+=p.vy*dts; p.vy*=0.98; p.life+=dts*1.5; p.x+=(Math.random()-0.5)*2;
      const a=Math.max(0,Math.min(1,p.life<0.3?p.life/0.3:1-((p.life-0.3)/0.7)));
      if(a>0){
        g.beginFill(p.life<0.4?C.fire:p.life<0.7?C.orange:C.gold,a*0.9);
        g.drawRect(p.x-p.size/2,p.y-p.size/2,p.size*(1-t*0.5),p.size*(1-t*0.5));
        g.endFill();
      }
      if(p.life>=1){ p.x=x+(Math.random()-0.5)*30; p.y=y; p.vy=-(60+Math.random()*80); p.life=0; }
    });
  },()=>{ atkLayer.removeChild(g); res(); }));
}

// Hero dash to position and back
function heroDash(tx,ty,dur){
  return new Promise(res=>{
    const sx=heroSpr.x, sy=heroSpr.y;
    // Add trail
    const ti=setInterval(()=>{
      heroTrail.unshift({x:heroSpr.x,y:heroSpr.y,alpha:0.8});
      if(heroTrail.length>8) heroTrail.pop();
    },20);
    anim(dur,t=>{
      heroSpr.x=lerp(sx,tx,easeOut(t));
      heroSpr.y=lerp(sy,ty,easeOut(t));
    },()=>{ clearInterval(ti); heroTrail=[]; res(); });
  });
}
function heroReturn(dur){
  return new Promise(res=>{
    const sx=heroSpr.x, sy=heroSpr.y;
    anim(dur,t=>{
      heroSpr.x=lerp(sx,heroBase.x,easeOut(t));
      heroSpr.y=lerp(sy,heroBase.y,easeOut(t));
    },res);
  });
}

// Enemy knockback
function enemyKnock(dx,dur){
  return new Promise(res=>{
    const sx=enemySpr.x;
    anim(dur,t=>{
      enemySpr.x=sx+dx*easeBounce(t);
    },()=>{ enemySpr.x=sx; res(); });
  });
}

function burst(x,y,col,n=18){
  const g=new PIXI.Graphics(); Lpopup.addChild(g);
  const ps=Array.from({length:n},()=>({x,y,vx:(Math.random()-0.5)*200,vy:(Math.random()-0.5)*200-60,life:1}));

    g.clear(); const dts=0.016;

    });

}

// ── Master attack animation by tier ───────────────────────────────────────────
async function playAttackAnim(tier, score, col){
  const ex=enemyBase.x, ey=enemyBase.y;
  const mid={x:(heroBase.x+ex)/2, y:(heroBase.y+ey)/2};

  if(tier===0){ // High Die – quick single slash
    await Promise.all([
      heroDash(heroBase.x+40, heroBase.y-30, 180),
      slashArc(mid.x, mid.y, 70, Math.PI*0.6, Math.PI*1.4, C.white, 250),
    ]);
    shake(3,180);
    burst(ex,ey,C.white,8);

  } else if(tier===1){ // Pair – double slash
    await heroDash(mid.x, mid.y-20, 180);
    await Promise.all([
      slashArc(ex,ey,80,Math.PI*0.4,Math.PI*1.5,C.green,300),
      slashArc(ex,ey,50,Math.PI*1.1,Math.PI*0.3,C.white,250),
    ]);
    shake(5,220);
    burst(ex,ey,C.green,12);

  } else if(tier===2){ // Two Pair – triple slash + ring
    await heroDash(mid.x-20, mid.y-10, 160);
    await Promise.all([
      slashArc(ex,ey,90,Math.PI*0.3,Math.PI*1.6,C.blue,320),
      slashArc(ex,ey,60,Math.PI*1.2,Math.PI*0.2,C.cyan,280),
      shockwave(ex,ey,C.cyan,80,350),
    ]);
    shake(7,260);
    burst(ex,ey,C.cyan,16);

  } else if(tier===3){ // Three of a Kind – fire + triple
    screenFlash(C.orange,80);
    await heroDash(ex-40, ey+20, 150);
    await Promise.all([
      slashArc(ex,ey,100,Math.PI*0.1,Math.PI*1.7,C.orange,350),
      slashArc(ex,ey,70, Math.PI*1.4,Math.PI*0.4,C.fire,300),
      slashArc(ex,ey,45, Math.PI*0.7,Math.PI*0.1,C.gold,280),
      fireColumn(ex,ey+30,500),
      shockwave(ex,ey,C.fire,100,400),
    ]);
    shake(10,350);
    burst(ex,ey,C.fire,22); burst(ex,ey,C.gold,12);

  } else if(tier===4){ // Full House – mega combo
    screenFlash(C.purple,100);
    await heroDash(ex, ey+30, 140);
    await Promise.all([
      slashArc(ex,ey,110,Math.PI*0.0,Math.PI*1.8,C.purple,380),
      slashArc(ex,ey,80, Math.PI*1.5,Math.PI*0.2,C.purple,340),
      slashArc(ex,ey,55, Math.PI*0.5,Math.PI*1.2,C.white,300),
      starBurst(ex,ey,C.purple,12,80,450),
      shockwave(ex,ey,C.purple,130,500),
    ]);
    shake(14,400); screenFlash(C.purple,60);
    burst(ex,ey,C.purple,28); burst(ex,ey,C.gold,16);

  } else if(tier===5){ // Four of a Kind – LIGHTNING
    screenFlash(C.orange,150);
    shake(5,200);
    await Promise.all([
      heroDash(ex-20, ey+40, 130),
      lightningBolt(ex,-20,ey,C.gold,400),
    ]);
    await Promise.all([
      slashArc(ex,ey,120,Math.PI*0.0,Math.PI*2.0,C.gold,400),
      slashArc(ex,ey,85, Math.PI*1.0,Math.PI*0.0,C.orange,360),
      slashArc(ex,ey,55, Math.PI*0.5,Math.PI*1.5,C.white,320),
      slashArc(ex,ey,30, Math.PI*1.3,Math.PI*0.7,C.gold,280),
      shockwave(ex,ey,C.gold,160,550),
      starBurst(ex,ey,C.gold,16,110,500),
    ]);
    shake(18,500); screenFlash(C.gold,100);
    burst(ex,ey,C.gold,32); burst(ex,ey,C.orange,20); burst(ex,ey,C.white,14);

  } else { // FIVE OF A KIND — ULTRA
    // Dramatic darkness
    const dark=new PIXI.Graphics(); dark.beginFill(0x000000,0.0); dark.drawRect(0,0,W,H); dark.endFill();
    Lpopup.addChild(dark);
    await new Promise(r=>anim(300,t=>dark.alpha=t*0.85,r));

    // Title text
    const ult=new PIXI.Text('FIVE OF A KIND',{fontFamily:FONT,fontSize:14,fill:'#ffd700',
      stroke:'#000',strokeThickness:5,align:'center'});
    ult.anchor.set(0.5); ult.position.set(W/2,H/2); ult.scale.set(0);
    Lpopup.addChild(ult);
    await new Promise(r=>anim(400,t=>ult.scale.set(easeBack(t)*1.1),r));
    await wait(400);

    // Hero glows gold
    heroSpr.tint=0xffd700;
    await new Promise(r=>anim(200,t=>dark.alpha=0.85-t*0.85,r));
    Lpopup.removeChild(dark); Lpopup.removeChild(ult);

    // Charge to center
    await heroDash(ex, ey+20, 120);
    shake(6,200);

    // ALL slashes simultaneously + lightning from all sides
    await Promise.all([
      slashArc(ex,ey,140,0,Math.PI*2,C.gold,500),
      slashArc(ex,ey,105,Math.PI*0.5,Math.PI*2.5,C.orange,480),
      slashArc(ex,ey,75,Math.PI*1.0,Math.PI*3.0,C.white,460),
      slashArc(ex,ey,45,Math.PI*1.5,Math.PI*3.5,C.gold,440),
      lightningBolt(ex,-20,ey,C.gold,300),
      lightningBolt(ex-60,-20,ey+20,C.cyan,280),
      lightningBolt(ex+60,-20,ey+20,C.white,260),
      starBurst(ex,ey,C.gold,24,160,600),
      shockwave(ex,ey,C.gold,220,700),
      shockwave(ex,ey,C.white,280,800),
    ]);
    shake(28,700);
    screenFlash(C.white,200);
    await wait(100);
    screenFlash(C.gold,100);

    burst(ex,ey,C.gold,40); burst(ex,ey,C.white,24);
    burst(ex,ey,C.orange,20); burst(ex,ey,C.cyan,16);
    heroSpr.tint=0xffffff;
  }

  await heroReturn(200);
  await enemyKnock(tier>=3?-30:tier>=1?-15:-8, 300);
}

// Score tally animation (chips count up)
async function tallyScore(result){
  return new Promise(res=>{
    let displayC=0;
    const step=Math.max(1,Math.ceil(result.chips/24));
    anim(600,()=>{
      displayC=Math.min(displayC+step,result.chips);
      if(_chTxt){ _chTxt.text=String(displayC); _scorTxt.text=String(displayC*result.mult); }
    },res);
  });
}

async function resolveEnemyIntent(result){
  if(!G.intent) G.intent=makeEnemyIntent();
  const intent=G.intent;
  if(intent.type==='guard'){
    G.enemyShield+=25+G.wave*3;
    smallPopup(enemyBase.x,enemyBase.y-18,`SHIELD +${25+G.wave*3}`,C.cyan);
  } else {
    let dmg=intent.dmg;
    let guard=result.tier*3+Math.min(8,G.combo);
    if(result.tier>=4) guard+=6;
    dmg=Math.max(0,dmg-guard-G.block);
    G.block=0;
    if(intent.type==='curse'){
      const d=G.dice[Math.floor(Math.random()*G.dice.length)];
      if(d){ d.value=Math.max(1,d.value-1); d.vy=-24; }
      smallPopup(W/2,UI.diceY-55,'DIE WEAKENED',C.purple);
    }
    if(dmg>0){
      G.pHP=Math.max(0,G.pHP-dmg);
      screenFlash(C.hp,150);
      smallPopup(heroBase.x,heroBase.y-34,`-${dmg}`,C.red);
      await enemyKnock(result.tier>=3?8:16,220);
    } else {
      smallPopup(heroBase.x,heroBase.y-34,'BLOCKED',C.cyan);
      burst(heroBase.x,heroBase.y,C.cyan,12);
    }
  }
  G.intent=makeEnemyIntent();
}

// ── Game actions ───────────────────────────────────────────────────────────────
async function onPlayHand(){
  if(G.busy||G.phase!=='roll') return;
  if(G.handsLeft<=0){ smallPopup(W/2,400,'NO HANDS LEFT',C.red); return; }
  G.busy=true; G.phase='attacking';

  const active=G.dice.filter(d=>d.held);
  const toScore=active.length?active:G.dice;
  const result=evalHand(toScore);
  G.handsLeft--;
  G.blazeNextMult=1; // reset blaze mult
  G.focus=0;

  const col=HAND_COLS[result.tier];
  if(_handTxt){
    _handTxt.text=result.hand.name;
    _handTxt.style.fill=col;
  }

  // Show hand name popup
  bigPopup(result.hand.name, col, result.tier>=4?2:result.tier>=2?1.5:1.2);

  // Play attack animation
  await playAttackAnim(result.tier, result.score, col);

  // Score tally
  await tallyScore(result);

  // Deal damage
  let dealt=result.score;
  if(G.enemyShield>0){
    const blocked=Math.min(G.enemyShield,dealt);
    G.enemyShield-=blocked;
    dealt-=blocked;
    smallPopup(enemyBase.x,enemyBase.y-34,`SHIELD -${blocked}`,C.cyan);
  }
  G.eHP=Math.max(0,G.eHP-dealt);
  bigDmgText(enemyBase.x,enemyBase.y-50,`-${dealt}`,col);
  G.combo=result.tier>=1?G.combo+1:0;
  if(result.tier>=3){
    G.block+=8+result.tier*2;
    smallPopup(heroBase.x,heroBase.y-44,`BLOCK +${8+result.tier*2}`,C.cyan);
  }

  if(G.eHP<=0){
    // Enemy defeated
    screenFlash(C.hpG,250);
    burst(enemyBase.x,enemyBase.y,0x55ee33,30);
    burst(enemyBase.x,enemyBase.y,C.gold,18);
    await wait(600);
    const xpGain=20+G.wave*8;
    addXP(xpGain);
    smallPopup(W/2,H*0.4,`+${xpGain} XP`,C.xpC);
    await wait(500);
    startLevelUp();
  } else if(G.handsLeft<=0){
    await resolveEnemyIntent(result);
    smallPopup(W/2,400,'OUT OF HANDS',C.orange);
    await wait(500);
    if(G.pHP<=0){ showGameOver(); return; }
    nextRound();
  } else {
    await resolveEnemyIntent(result);
    if(G.pHP<=0){ showGameOver(); return; }
    G.phase='roll'; G.busy=false;
    rollUnheld();
    G.dice.forEach(d=>d.held=false);
    rebuildDiceZones();
  }
}

function onDiscard(){
  if(G.busy||G.phase!=='roll') return;
  if(G.discardsLeft<=0){ smallPopup(W/2,400,'NO DISCARDS',C.red); return; }
  const toDiscard=G.dice.filter(d=>!d.held);
  if(!toDiscard.length){ smallPopup(W/2,400,'HOLD DICE TO KEEP',C.orange); return; }
  G.discardsLeft--;
  toDiscard.forEach(d=>{ d.value=Math.ceil(Math.random()*6); d.vy=-55; });
  G.dice.forEach(d=>d.held=false);
  rebuildDiceZones();
}

// ── Abilities ─────────────────────────────────────────────────────────────────
async function useAbility(i){
  const ab=G.abilities[i];
  if(!ab||!ab.unlocked||!ab.ready||G.busy) return;
  ab.ready=false; G.busy=true;

  if(ab.id==='blaze'){
    screenFlash(C.fire,100);
    await Promise.all([
      heroDash(enemyBase.x,enemyBase.y+30,150),
      fireColumn(enemyBase.x,enemyBase.y+20,600),
    ]);
    const dmg=60;
    G.eHP=Math.max(0,G.eHP-dmg);
    bigDmgText(enemyBase.x,enemyBase.y-40,`BLAZE -${dmg}`,C.fire);
    G.blazeNextMult=2;
    smallPopup(W/2,H*0.5,'MULT x2 NEXT HAND',C.orange);
    await heroReturn(200);
    shake(10,300);

  } else if(ab.id==='thunder'){
    const dmg=Math.ceil(G.eMaxHP*0.3);
    await Promise.all([
      lightningBolt(enemyBase.x,-30,enemyBase.y,C.gold,500),
      lightningBolt(enemyBase.x-30,-30,enemyBase.y+10,C.cyan,450),
      lightningBolt(enemyBase.x+30,-30,enemyBase.y+10,C.white,400),
    ]);
    G.eHP=Math.max(0,G.eHP-dmg);
    shake(16,400); screenFlash(C.gold,150);
    bigDmgText(enemyBase.x,enemyBase.y-50,`THUNDER -${dmg}`,C.gold);
    burst(enemyBase.x,enemyBase.y,C.gold,24);

  } else if(ab.id==='frost'){
    // Freeze – all dice keep values, mult tripled next hand
    const g2=new PIXI.Graphics(); g2.beginFill(C.ice,0.3); g2.drawRect(0,0,W,H); g2.endFill();
    Lpopup.addChild(g2);
    await Promise.all([shockwave(W/2,H/2,C.ice,200,400), starBurst(W/2,H/2,C.ice,16,120,350)]);
    screenFlash(C.ice,200);
    G.blazeNextMult=3;
    smallPopup(W/2,H*0.5,'FROST: MULT x3',C.ice);
    setTimeout(()=>Lpopup.removeChild(g2),300);

  } else if(ab.id==='deathspin'){
    // Reroll all dice 3x, keep best value per die
    const best=G.dice.map(d=>d.value);
    for(let r=0;r<3;r++){
      await wait(150);
      G.dice.forEach((d,i)=>{ const nv=Math.ceil(Math.random()*6); if(nv>best[i])best[i]=nv; d.vy=-40; });
    }
    G.dice.forEach((d,i)=>{ d.value=best[i]; d.held=false; });
    screenFlash(C.purple,200);
    burst(W/2,H*0.55,C.purple,28);
    smallPopup(W/2,H*0.5,'DEATH SPIN: BEST VALUES',C.purple);
    rebuildDiceZones();
  }

  ab.ready=true; // abilities are reusable once per run (no cooldown here, 1/wave)
  // Make not ready again until next wave
  ab.ready=false;
  if(G.eHP<=0){
    screenFlash(C.hpG,220);
    burst(enemyBase.x,enemyBase.y,0x55ee33,28);
    const xpGain=18+G.wave*7;
    addXP(xpGain);
    smallPopup(W/2,H*0.4,`+${xpGain} XP`,C.xpC);
    await wait(450);
    G.busy=false;
    startLevelUp();
    return;
  }
  G.busy=false;
}

// ── Level-up (Joker selection) ─────────────────────────────────────────────────
function startLevelUp(){
  G.phase='levelup';
  showJokerPanel(genJokers());
}

function genJokers(){
  const pool=[
    {name:'Firestarter',desc:'fire infuse\nall dice',bg:0x440d00,bc:C.fire,   apply:()=>G.dice.forEach(d=>{if(d.el==='none')d.el='fire';})},
    {name:'Frostbind',  desc:'ice infuse\nall dice', bg:0x001a33,bc:C.ice,    apply:()=>G.dice.forEach(d=>{if(d.el==='none')d.el='ice';})},
    {name:'Venomous',   desc:'poison\nall dice',     bg:0x0d3300,bc:C.poison, apply:()=>G.dice.forEach(d=>{if(d.el==='none')d.el='poison';})},
    {name:'Extra Die',  desc:'+1 die\nto pool',      bg:0x0d1a55,bc:C.blue,   apply:()=>G.diceCount=Math.min(7,G.diceCount+1)},
    {name:'Twin Dice',  desc:'+2 dice\nto pool',     bg:0x051040,bc:C.blue,   apply:()=>G.diceCount=Math.min(7,G.diceCount+2)},
    {name:'Glass Knuckles',desc:'+2 mult\nall hands',bg:0x330011,bc:C.mult,   apply:()=>G.jokers.push({type:'mult',val:2})},
    {name:'Gold Stack', desc:'+15 chips\nall hands', bg:0x332200,bc:C.gold,   apply:()=>G.jokers.push({type:'chips',val:15})},
    {name:'Speed Hands',desc:'+1 hand\nevery wave',  bg:0x003322,bc:C.green,  apply:()=>{G.jokers.push({type:'hand'});}},
    {name:'Mend',       desc:'restore\n20 HP',       bg:0x003311,bc:0x55ff88, apply:()=>G.pHP=Math.min(G.pMaxHP,G.pHP+20)},
    {name:'Bulwark',    desc:'+20 max HP\n& +10 HP',  bg:0x330011,bc:C.hp,    apply:()=>{G.pMaxHP+=20;G.pHP=Math.min(G.pMaxHP,G.pHP+10);}},
  ];
  const f=pool.filter(u=>!(u.name==='Extra Die'&&G.diceCount>=7)&&!(u.name==='Twin Dice'&&G.diceCount>=6));
  for(let i=f.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[f[i],f[j]]=[f[j],f[i]];}
  return f.slice(0,3);
}

let jZones=[];
function showJokerPanel(ups){
  Lover.removeChildren(); jZones=[];
  const ov=new PIXI.Graphics(); ov.beginFill(0x000000,0.88); ov.drawRect(0,0,W,H); ov.endFill();
  Lover.addChild(ov);

  const title=new PIXI.Text('CHOOSE A JOKER',{fontFamily:FONT,fontSize:14,fill:'#ffd700',stroke:'#000',strokeThickness:5,align:'center'});
  title.anchor.set(0.5); title.position.set(W/2,H*0.13); Lover.addChild(title);

  const sub=new PIXI.Text(`wave ${G.wave} cleared  |  lv ${G.level+1}`,{fontFamily:FONT,fontSize:7,fill:'#cc99ff',stroke:'#000',strokeThickness:2,align:'center'});
  sub.anchor.set(0.5); sub.position.set(W/2,H*0.21); Lover.addChild(sub);

  const cW=96, cH=148, cY=H*0.54;
  [W*0.18,W*0.5,W*0.82].forEach((x,i)=>{
    const u=ups[i]; if(!u) return;
    const g=new PIXI.Graphics();
    // Shadow
    g.beginFill(0x000000,0.65); g.drawRect(x-cW/2+5,cY-cH/2+5,cW,cH); g.endFill();
    // Body
    g.beginFill(u.bg); g.drawRect(x-cW/2,cY-cH/2,cW,cH); g.endFill();
    // Pixel bevel
    g.beginFill(0xffffff,0.22); g.drawRect(x-cW/2,cY-cH/2,cW,2); g.endFill();
    g.beginFill(0xffffff,0.1);  g.drawRect(x-cW/2,cY-cH/2,2,cH); g.endFill();
    g.beginFill(0x000000,0.3);  g.drawRect(x-cW/2,cY+cH/2-2,cW,2); g.endFill();
    // Border
    g.lineStyle(2,u.bc,0.95); g.drawRect(x-cW/2,cY-cH/2,cW,cH); g.lineStyle(0);
    // Icon panel
    g.beginFill(0x000000,0.4); g.drawRect(x-20,cY-52,40,40); g.endFill();
    g.beginFill(u.bc,0.9);    g.drawRect(x-18,cY-50,36,36); g.endFill();
    g.beginFill(0xffffff,0.25);g.drawRect(x-17,cY-49,16,16); g.endFill();

    const nt=new PIXI.Text(u.name,{fontFamily:FONT,fontSize:6,fill:'#ffffff',stroke:'#000',strokeThickness:2,align:'center',wordWrap:true,wordWrapWidth:cW-10});
    nt.anchor.set(0.5); nt.position.set(x,cY+6); g.addChild(nt);
    const dt=new PIXI.Text(u.desc,{fontFamily:FONT,fontSize:5,fill:'#cccccc',stroke:'#000',strokeThickness:1,align:'center'});
    dt.anchor.set(0.5); dt.position.set(x,cY+36); g.addChild(dt);

    g.eventMode='static'; g.cursor='pointer';
    g.on('pointertap',()=>pickJoker(u));
    g.on('pointerover',()=>{ g.tint=0xffeeaa; });
    g.on('pointerout', ()=>{ g.tint=0xffffff; });
    Lover.addChild(g); jZones.push(g);
  });

  // Pulse title
  let p=0; const pt=app.ticker.add(()=>{
    if(G.phase!=='levelup'){app.ticker.remove(pt);return;}
    p+=0.05; title.scale.set(1+Math.sin(p)*0.04);
  });
}

function pickJoker(u){
  u.apply();
  G.level++;
  // Restore ability readiness each wave
  G.abilities.forEach(ab=>{ if(ab.unlocked) ab.ready=true; });
  Lover.removeChildren(); jZones=[];
  burst(W/2,H/2,C.gold,28); screenFlash(C.gold,120);
  nextRound();
}

function nextRound(){
  G.wave++;
  G.handsLeft=4+G.jokers.filter(j=>j.type==='hand').length;
  G.discardsLeft=3;
  G.combo=0; G.block=0; G.focus=0;
  spawnEnemy();
  freshRoll();
  rebuildDiceZones();
  buildAbilityBar();
  G.busy=false; G.phase='roll';
  smallPopup(W/2,H*0.35,`WAVE ${G.wave}`,C.gold);
}

// ── Game over ──────────────────────────────────────────────────────────────────
function showGameOver(){
  G.phase='dead'; G.busy=true;
  Lover.removeChildren();
  shake(20,600); screenFlash(C.red,400);
  setTimeout(()=>{
    const ov=new PIXI.Graphics(); ov.beginFill(0x000000,0.88); ov.drawRect(0,0,W,H); ov.endFill();
    Lover.addChild(ov);
    const g=new PIXI.Text('GAME OVER',{fontFamily:FONT,fontSize:22,fill:'#ff3355',stroke:'#000',strokeThickness:7,align:'center'});
    g.anchor.set(0.5); g.position.set(W/2,H*0.36); Lover.addChild(g);
    const w=new PIXI.Text(`WAVE ${G.wave}  ·  LV ${G.level}\n${G.jokers.length} JOKERS COLLECTED`,{fontFamily:FONT,fontSize:8,fill:'#ccaaff',stroke:'#000',strokeThickness:3,align:'center'});
    w.anchor.set(0.5); w.position.set(W/2,H*0.5); Lover.addChild(w);
    const r=new PIXI.Text('TAP TO RETRY',{fontFamily:FONT,fontSize:9,fill:'#ffd700',stroke:'#000',strokeThickness:3,align:'center'});
    r.anchor.set(0.5); r.position.set(W/2,H*0.64); r.eventMode='static'; r.cursor='pointer';
    r.on('pointertap',()=>{ Lover.removeChildren(); newGame(); rebuildDiceZones(); buildAbilityBar(); });
    Lover.addChild(r);
    let rb=false;
    app.ticker.add(function blink(){ rb=!rb; r.alpha=rb?1:0.35; if(G.phase!=='dead')app.ticker.remove(blink); });
  },900);
}

// ── Main game loop ─────────────────────────────────────────────────────────────
bakeAll();
newGame();
buildWorld();
buildUITexts();
drawPanels();
buildButtons();
buildAbilityBar();
rebuildDiceZones();

app.ticker.add(()=>{
  G.tick+=app.ticker.deltaMS;
  if(G.phase==='dead') return;

  drawBG();
  drawWorld();
  drawDice();
  drawButtons();
  drawBars();
  drawStats();
  drawAbilityBar();
  if(G.phase==='roll') updateScorePanel();
});
</script>
